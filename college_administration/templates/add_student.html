<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    


    {% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center" style="margin-top: 50px;">

    <div class="col-md-3">

        <div class="card shadow p-4">

            <h3 class="text-center mb-4">
                {% if student %}Edit Student{% else %}Add Student{% endif %}
            </h3>

            {% if error %}
                <p class="text-danger">{{ error }}</p>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="name"
                       placeholder="Name"
                       value="{{ student.name|default:'' }}"
                       class="form-control mb-3" required>

                <input type="text" name="roll_no"
                       placeholder="Roll No"
                       value="{{ student.roll_no|default:'' }}"
                       class="form-control mb-3" required>

                <input type="email" name="email"
                       placeholder="Email"
                       value="{{ student.email|default:'' }}"
                       class="form-control mb-3" required>

                <select name="course" class="form-control mb-3" required>
                    <option value="">Select Course</option>
                    {% for c in courses %}
                        <option value="{{ c.id }}"
                            {% if student and student.course.id == c.id %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                    {% endfor %}
                </select>

                <select name="department" class="form-control mb-3">
                    <option value="">Select Department</option>
                    {% for d in departments %}
                        <option value="{{ d.id }}"
                            {% if student and student.department and student.department.id == d.id %}selected{% endif %}>
                            {{ d.name }}
                        </option>
                    {% endfor %}
                </select>

                <select name="subject" id="subject" class="form-control mb-3">
                    <option value="">Select Subject</option>
                    {% for s in subjects %}
                        <option value="{{ s.id }}" data-course="{{ s.course.id }}">
                            {{ s.name }}
                        </option>
                    {% endfor %}
                </select>

                <input type="number" name="marks"
                       placeholder="Enter Marks"
                       value="{{ mark.marks|default:'' }}"
                       class="form-control mb-3">

                <button class="btn btn-dark w-100">Save</button>

                <a href="/students/" class="btn btn-secondary w-100 mt-2">Back</a>

            </form>

        </div>

    </div>

</div>

<script>
document.querySelector('select[name="course"]').addEventListener('change', function() {
    let courseId = this.value;
    let subjects = document.querySelectorAll('#subject option');

    subjects.forEach(option => {
        if (option.value === "") return;

        if (option.getAttribute('data-course') === courseId) {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    });
});
</script>

{% endblock %}





</body>
</html>
